<!DOCTYPE html>
<html>
<head>
    <title>SkyJet Airways</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="{% url 'home' %}" class="brand">SkyJet</a>
        <div class="nav-links">
            {% if user.is_authenticated %}
                {% if user.is_staff %}
                    <a href="{% url 'admin_dashboard' %}">Dashboard</a>
                {% else %}
                    <a href="{% url 'passenger_dashboard' %}">Dashboard</a>
                {% endif %}
                <a href="{% url 'logout' %}">Logout</a>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'register' %}">Sign Up</a>
            {% endif %}
        </div>
    </nav>
    <div class="content">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
